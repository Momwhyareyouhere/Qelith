name: site-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-site-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package site
        run: |
          tar -C site -czf site.tar.gz .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: site.tar.gz
          generate_release_notes: true
